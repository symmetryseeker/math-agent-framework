name: verify_mathematical
category: verification
description: "Run the full 5-level verification pipeline on any mathematical claim"
trigger_keywords:
  - verify
  - check
  - validate
  - prove
  - is this correct
  - 验证
  - 检验
  - 证明
  - 是否正确

system_prompt_extension: |
  You are verifying a mathematical claim using a 5-level pipeline.

  Level 1: SymPy symbolic verification
  Level 2: Monte Carlo numerical verification (10,000 samples)
  Level 3: SageMath CAS cross-verification (independent engine)
  Level 4: Lean 4 formal proof template
  Level 5: QED multi-agent adversarial verification

  A claim is ACCEPTED only if ALL available levels pass.

tool_sequence:
  - tool: math_verify_symbolic
    args: {}
    desc: "SymPy symbolic identity and consistency checks"
    required: true
  - tool: math_verify_monte_carlo
    args: {n_samples: 10000, seed: 42}
    desc: "Monte Carlo numerical verification"
    required: true
  - tool: math_sage_verify
    args: {}
    desc: "SageMath CAS cross-verification"
    required: false
  - tool: math_formal_proof
    args: {theorem: quadratic_minimum}
    desc: "Lean 4 formal proof template"
    required: false
  - tool: math_multi_agent_verify
    args: {}
    desc: "QED multi-agent adversarial verification"
    required: true

output_schema:
  verdict: string
  levels: dict
  pass_rate: number
  confidence: number
